  <text x="49" y="281" fill="#cacaca" font-family="Consolas, monospace" font-size="13">Capture context that should travel with the work, such as setup details, gotchas, and expected next steps.</text>

  <text x="8" y="317" fill="#d5d5d5" font-family="Consolas, monospace" font-size="14">Review Status</text>
